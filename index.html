<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyPlan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>StudyPlan</h1>
    <div class="container"> 
        <div class="card">
            <p>QUAL MATÉRIA OU ASSUNTO?</p>
            <div><label><input id="nome" type="text" placeholder="Nome da matéria"></label></div><br>
            <p>SEU NÍVEL ATUAL</p>
            <div class="dificuldade">
                <button class="nivel">1</button>
                <button class="nivel">2</button>
                <button class="nivel">3</button>
                <button class="nivel">4</button>
            </div><br>
            <p>HORAS POR DIA DISPONÍVEIS</p>
            <div><label><input id="horas" type="number" placeholder="Horas por dia"></label></div><br>
            <p>PRAZO (EM DIAS)</p>
            <div><label><input id="dias" type="number" placeholder="Dias até a prova"></label></div><br>
            <div><button onclick="gerarPlanos()" id="botao">Ver meu veredito</button>
        </div>
    </div>

</body>
<script>
    
    function gerarPlanos(){
        let inputMateria = document.querySelector("#nome")
        let nomeMateria = inputMateria.value

        let inputDias = document.querySelector("#dias")
        let quantosDias = Number(inputDias.value)

        let inputHoras = document.querySelector("#horas")
        let quantasHoras = Number(inputHoras.value)

        let inputDificuldade = document.querySelector(".dificuldade")
        let dificuldadeEscolhida = Number(inputDificuldade.value)

        let resultado = calcularTempo(quantosDias, quantasHoras, dificuldadeEscolhida)
    

        if(nomeMateria ==='' || (quantosDias < 1) || quantasHoras < 1 ){
            alert(`Resultado não aceito`)
        }else if(resultado < 4){
            alert(`Para ${nomeMateria} terá que estudar ${resultado} horas por dia. Parece muito mas você consegue`)
        }else if(resultado >= 4 && resultado<= 6 ){
             alert(`Para ${nomeMateria} terá que estudar ${resultado} horas por dia. Vai ser ralado demais, mas vai ter que sentar e estudar`)
        }else if(resultado > 6){
             alert(`Para ${nomeMateria} terá que estudar ${resultado} horas por dia. Isso é impossível sinto muito`)
        }

    }
    function calcularTempo(dias, horas, dificuldade){
        let horasTotais = dias * horas
        let peso = 1 + (dificuldade * 0.25)
        let resultado = (horasTotais * peso) / dias
        return resultado
    }



</script>
</html>
